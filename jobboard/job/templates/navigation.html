{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Job Board</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* NAVBAR */
        .navbar {
            background: #184427;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(1, 119, 46, 0.1);
        }

        .navbar h2 {
           color: white;
        }


        .nav-links {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            white-space: nowrap;
        }

        .auth {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .auth .slash {
            color: #999;
            font-weight: normal;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            background: #184427;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 60px;
        }

        .left-section {
            flex: 1;
        }

        .left-section h1 {
            font-size: 48px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 20px;
        }

        .left-section input {
            width: 360px;
            padding: 16px 20px;
            font-size: 18px;
            border-radius: 25px;
            border: none;
            outline: none;
        }

        .left-section button {
            padding: 16px 26px;
            font-size: 18px;
            border-radius: 25px;
            border: none;
            background-color: #1dbf73;
            color: white;
            cursor: pointer;
            margin-left: 10px;
        }

        /* RIGHT SECTION */
        .right-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-box {
            position: relative;
            width: 350px;
            height: 450px;
        }

        .img {
            width: 250px;
            height: 350px;
            object-fit: cover;
            border-radius: 20px;
            position: absolute;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .img1 {
            top: 0;
            left: 0;
            z-index: 1;
        }

        .img2 {
            bottom: 0;
            right: 0;
            z-index: 2;
        }

        /* Floating cards */
        .card {
            position: absolute;
            background: white;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 13px;
            color: #333;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card1 {
            top: 30px;
            right: -40px;
        }

        .card2 {
            bottom: 40px;
            left: -40px;
        }

        /* JOB LISTINGS */
        .jobs {
            padding: 40px;
            background: #f4f4f4;
        }

        .job-card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <h2>JobBoard</h2>

        <div class="nav-links">
            <a href="{% url 'index' %}">Home</a>
            <a href="#"> Latest Jobs</a>

            <div class="auth">
                <a href="{% url 'signup' %}"> Sign Up</a>
                <span class="slash">/</span>
                <a href="{% url 'signin' %}"> Sign In </a>
            </div>
            <a href="{% url 'admin_login' %}">Admin Login</a>
            <a href="#">Contact Us</a>
        </div>
    </nav> 
{% block body %} 
{% endblock %}
</body>
</html>
