<!DOCTYPE html>
<html>
<head>
    <title>Job Board</title>
    <link rel="stylesheet" href="https://unpkg.com/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    {% load static %}
</head>
<body>

{% include 'navigation.html' %}

{% if messages %}
<div class="container mt-3">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
</div>
{% endif %}

<section class="bg-light p-3 p-md-4 p-xl-5">
<div class="container">
<div class="row justify-content-center">
<div class="col-12 col-xxl-11">

<div class="card shadow-sm">
<div class="row g-0">

<div class="col-md-6">
<img src="{% static 'images/logo-img-1.webp' %}" class="img-fluid w-100 h-100">
</div>

<div class="col-md-6">
<div class="card-body p-4">

<h3 class="text-center mb-4">Registration</h3>

<form method="POST" action="{% url 'signup' %}">
{% csrf_token %}

<div class="form-floating mb-3">
<input type="text" class="form-control" name="firstName" placeholder="First Name" required>
<label>First Name</label>
</div>

<div class="form-floating mb-3">
<input type="text" class="form-control" name="lastName" placeholder="Last Name" required>
<label>Last Name</label>
</div>

<div class="form-floating mb-3">
<input type="email" class="form-control" name="email" placeholder="Email" required>
<label>Email</label>
</div>

<div class="form-floating mb-3">
<select class="form-select" name="role" id="role" onchange="toggleCompanyField()" required>
<option value="">Select Role</option>
<option value="user">Job Seeker</option>
<option value="recruiter">Recruiter</option>
</select>
<label>Select Role</label>
</div>

<div class="form-floating mb-3" id="companyDiv" style="display:none;">
<input type="text" class="form-control" name="company_name" placeholder="Company Name">
<label>Company Name</label>
</div>

<div class="form-floating mb-3">
<input type="password" class="form-control" name="password" placeholder="Password" required>
<label>Password</label>
</div>

<div class="d-grid">
<button class="btn btn-dark btn-lg">Sign Up</button>
</div>

<p class="text-center mt-3">
Already have an account? <a href="{% url 'signin' %}">Sign In</a>
</p>

</form>

</div>
</div>

</div>
</div>

</div>
</div>
</div>
</section>

<script>
function toggleCompanyField() {
    let role = document.getElementById("role").value;
    let companyDiv = document.getElementById("companyDiv");

    if (role === "recruiter") {
        companyDiv.style.display = "block";
    } else {
        companyDiv.style.display = "none";
    }
}
</script>

</body>
</html>
